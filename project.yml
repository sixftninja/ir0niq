name: Ironiq
options:
  bundleIdPrefix: com.ir0niq
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    CURRENT_PROJECT_VERSION: 35
    VERSIONING_SYSTEM: apple-generic

configs:
  Debug: debug
  Release: release

targets:

  # ─── iOS App ───────────────────────────────────────────────────────────────
  Ironiq:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Ironiq
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ir0niq.app
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_ENTITLEMENTS: Ironiq/Ironiq.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Unsigned for simulator/test builds — overridden in Fastfile for distribution
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
      configs:
        Release:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: Apple Development
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
    info:
      path: Ironiq/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.323802514528-f5inc1l6a4sgt7r067is6v8gghmc5aji
        GoogleOAuthClientID: 323802514528-f5inc1l6a4sgt7r067is6v8gghmc5aji.apps.googleusercontent.com
        GoogleOAuthReversedClientID: com.googleusercontent.apps.323802514528-f5inc1l6a4sgt7r067is6v8gghmc5aji
        CFBundleDisplayName: Ironiq
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: "AccentColor"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: "Ironiq reads your heart rate to enhance workout tracking."
        NSHealthUpdateUsageDescription: "Ironiq saves your workouts to Apple Health."
        NSUbiquitousContainers:
          iCloud.com.ir0niq.app:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: Ironiq
            NSUbiquitousContainerSupportedFolderLevels: Any

  # ─── watchOS App ───────────────────────────────────────────────────────────
  IroniqWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: IroniqWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ir0niq.app.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    info:
      path: IroniqWatch/Info.plist
      properties:
        CFBundleDisplayName: Ironiq
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        WKApplication: true
        WKWatchOnly: true
        NSHealthShareUsageDescription: "Ironiq reads heart rate during your workout."
        NSHealthUpdateUsageDescription: "Ironiq saves your workout to Apple Health."
        UIBackgroundModes:
          - workout-processing

  # ─── watchOS Complication Extension ───────────────────────────────────────
  IroniqWatchComplication:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: IroniqWatchComplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ir0niq.app.watchkitapp.watchkitextension
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    info:
      path: IroniqWatchComplication/Info.plist
      properties:
        CFBundleDisplayName: Ironiq Complication
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  # ─── iOS Unit Tests ────────────────────────────────────────────────────────
  IroniqTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: IroniqTests
    resources:
      - path: Ironiq/Resources/IroniqExercises.json
    dependencies:
      - target: Ironiq
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ir0niq.app.tests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES

  # ─── iOS UI Tests ──────────────────────────────────────────────────────────
  IroniqUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: IroniqUITests
    dependencies:
      - target: Ironiq
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ir0niq.app.uitests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES

  # ─── watchOS Unit Tests ────────────────────────────────────────────────────
  IroniqWatchTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: IroniqWatchTests
    dependencies:
      - target: IroniqWatch
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ir0niq.app.watchtests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

# ─── Schemes ─────────────────────────────────────────────────────────────────
schemes:

  Ironiq:
    build:
      targets:
        Ironiq: all
        IroniqTests: [testing]
        IroniqUITests: [testing]
    test:
      targets:
        - IroniqTests
        - IroniqUITests
      config: Debug
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  IroniqWatch:
    build:
      targets:
        IroniqWatch: all
        IroniqWatchComplication: all
        IroniqWatchTests: [testing]
    test:
      targets:
        - IroniqWatchTests
      config: Debug
    run:
      config: Debug
    archive:
      config: Release
