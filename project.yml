name: Forge
options:
  bundleIdPrefix: com.forgegym
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

configs:
  Debug: debug
  Release: release

targets:

  # ─── iOS App ───────────────────────────────────────────────────────────────
  Forge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Forge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgegym.app
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_ENTITLEMENTS: Forge/Forge.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Unsigned for simulator/test builds — overridden in Fastfile for distribution
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
      configs:
        Release:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Distribution"
          CODE_SIGNING_REQUIRED: YES
    info:
      path: Forge/Info.plist
      properties:
        CFBundleDisplayName: Forge
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: "AccentColor"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: "Forge reads your heart rate to enhance workout tracking."
        NSHealthUpdateUsageDescription: "Forge saves your workouts to Apple Health."
        UIBackgroundModes:
          - workout-processing
        NSUbiquitousContainers:
          iCloud.com.forgegym.app:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: Forge
            NSUbiquitousContainerSupportedFolderLevels: Any

  # ─── watchOS App ───────────────────────────────────────────────────────────
  ForgeWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: ForgeWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgegym.app.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    info:
      path: ForgeWatch/Info.plist
      properties:
        CFBundleDisplayName: Forge
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKWatchOnly: true
        NSHealthShareUsageDescription: "Forge reads heart rate during your workout."
        NSHealthUpdateUsageDescription: "Forge saves your workout to Apple Health."
        UIBackgroundModes:
          - workout-processing

  # ─── watchOS Complication Extension ───────────────────────────────────────
  ForgeWatchComplication:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: ForgeWatchComplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgegym.app.watchkitapp.complication
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    info:
      path: ForgeWatchComplication/Info.plist
      properties:
        CFBundleDisplayName: Forge Complication
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  # ─── iOS Unit Tests ────────────────────────────────────────────────────────
  ForgeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ForgeTests
    resources:
      - path: Forge/Resources/ForgeExercises.json
    dependencies:
      - target: Forge
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgegym.app.tests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES

  # ─── iOS UI Tests ──────────────────────────────────────────────────────────
  ForgeUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ForgeUITests
    dependencies:
      - target: Forge
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgegym.app.uitests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  # ─── watchOS Unit Tests ────────────────────────────────────────────────────
  ForgeWatchTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: ForgeWatchTests
    dependencies:
      - target: ForgeWatch
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgegym.app.watchtests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

# ─── Schemes ─────────────────────────────────────────────────────────────────
schemes:

  Forge:
    build:
      targets:
        Forge: all
        ForgeTests: [testing]
        ForgeUITests: [testing]
    test:
      targets:
        - ForgeTests
        - ForgeUITests
      config: Debug
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ForgeWatch:
    build:
      targets:
        ForgeWatch: all
        ForgeWatchComplication: all
        ForgeWatchTests: [testing]
    test:
      targets:
        - ForgeWatchTests
      config: Debug
    run:
      config: Debug
    archive:
      config: Release
