name: Forge
options:
  bundleIdPrefix: com.forgegym
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

configs:
  Debug: debug
  Release: release

targets:

  # ─── iOS App ───────────────────────────────────────────────────────────────
  Forge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Forge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgegym.app
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    info:
      path: Forge/Info.plist
      properties:
        CFBundleDisplayName: Forge
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false

  # ─── watchOS App ───────────────────────────────────────────────────────────
  ForgeWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: ForgeWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgegym.app.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    info:
      path: ForgeWatch/Info.plist
      properties:
        CFBundleDisplayName: Forge
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        WKWatchOnly: true

  # ─── iOS Unit Tests ────────────────────────────────────────────────────────
  ForgeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ForgeTests
    resources:
      - path: Forge/Resources/ForgeExercises.json
    dependencies:
      - target: Forge
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgegym.app.tests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES

  # ─── iOS UI Tests ──────────────────────────────────────────────────────────
  ForgeUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ForgeUITests
    dependencies:
      - target: Forge
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgegym.app.uitests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  # ─── watchOS Unit Tests ────────────────────────────────────────────────────
  ForgeWatchTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: ForgeWatchTests
    dependencies:
      - target: ForgeWatch
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgegym.app.watchtests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

# ─── Schemes ─────────────────────────────────────────────────────────────────
schemes:

  Forge:
    build:
      targets:
        Forge: all
        ForgeTests: [testing]
        ForgeUITests: [testing]
    test:
      targets:
        - ForgeTests
        - ForgeUITests
      config: Debug
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ForgeWatch:
    build:
      targets:
        ForgeWatch: all
        ForgeWatchTests: [testing]
    test:
      targets:
        - ForgeWatchTests
      config: Debug
    run:
      config: Debug
    archive:
      config: Release
